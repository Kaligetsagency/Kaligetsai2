<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-8">
    <div class="max-w-4xl mx-auto space-y-8">
        <header class="border-b border-gray-700 pb-4">
            <h1 class="text-3xl font-bold text-blue-400">Agent Command Center (Minimal)</h1>
        </header>

        <section class="bg-gray-800 rounded-lg p-6 shadow-lg">
            <h2 class="text-xl font-semibold mb-4">New Objective</h2>
            <div class="flex gap-4">
                <input type="text" id="objectiveInput" placeholder="e.g., Run 'ls -la'..." class="flex-1 bg-gray-700 text-white rounded px-4 py-2">
                <button onclick="submitTask()" id="submitBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-6 rounded">Execute</button>
            </div>
            <p id="statusMessage" class="mt-3 text-sm hidden"></p>
        </section>

        <section class="bg-gray-800 rounded-lg p-6 shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">In-Memory History</h2>
                <button onclick="fetchTasks()" class="text-sm text-blue-400">↻ Refresh</button>
            </div>
            <div id="taskList" class="space-y-4"></div>
        </section>
    </div>
    <script src="/script.js"></script>
</body>
          </html>
